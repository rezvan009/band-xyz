<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band Hardcore XYZ - Merchandise</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Press Start 2P', monospace;
    background:#111;
    color:#fff;
}

/* NAV */
nav{
    background:#000;
    padding:15px;
    text-align:center;
    position:fixed;
    width:100%;
    top:0;
    z-index:100;
    border-bottom:3px solid #ff0000;
}

nav a{
    color:#fff;
    margin:0 15px;
    cursor:pointer;
}

/* CONTENT */
#content{
    margin-top:80px;
}

/* HOME */
.home{
    padding:60px 20px;
    text-align:center;
}

.merch-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.merch-card{
    background:#222;
    padding:10px;
    border:2px solid red;
}

.merch-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:5px;
    transition:0.3s;
}

.merch-card:hover img{
    transform:scale(1.1);
}

/* ABOUT */
.about{
    padding:100px 20px;
    text-align:center;
}

/* PORTFOLIO */
.portfolio{
    padding:100px 20px;
    text-align:center;
}

.portfolio .card{
    background:#222;
    padding:20px;
    margin:10px;
}

/* CONTACT */
.contact{
    padding:100px 20px;
    text-align:center;
}

.contact input, .contact textarea{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('portfolio')">Portfolio</a>
    <a onclick="showPage('contact')">Contact</a>
</nav>

<div id="content"></div>

<script>
function showPage(page){
    const content=document.getElementById('content');

    // HOME (PRODUK BANYAK)
    if(page==='home'){
        content.className='home';

        const products = [
            {name:'Kaos 1', price:150000, img:'images/kaos/kaos1.jpg'},
            {name:'Kaos 2', price:150000, img:'images/kaos/kaos2.jpg'},
            {name:'Kaos 3', price:150000, img:'images/kaos/kaos3.jpg'},
            {name:'Kaos 4', price:150000, img:'images/kaos/kaos4.jpg'},
            {name:'Kaos 5', price:150000, img:'images/kaos/kaos5.jpg'},

            {name:'Hoodie 1', price:250000, img:'images/hoodie/hoodie1.jpg'},
            {name:'Hoodie 2', price:250000, img:'images/hoodie/hoodie2.jpg'},
            {name:'Hoodie 3', price:250000, img:'images/hoodie/hoodie3.jpg'},

            {name:'Poster 1', price:50000, img:'images/poster/poster1.jpg'},
            {name:'Poster 2', price:50000, img:'images/poster/poster2.jpg'},
            {name:'Poster 3', price:50000, img:'images/poster/poster3.jpg'},

            {name:'Patch 1', price:25000, img:'images/patch/patch1.jpg'},
            {name:'Patch 2', price:25000, img:'images/patch/patch2.jpg'},

            {name:'Sticker 1', price:15000, img:'images/sticker/sticker1.jpg'},
            {name:'Sticker 2', price:15000, img:'images/sticker/sticker2.jpg'},
            {name:'Sticker 3', price:15000, img:'images/sticker/sticker3.jpg'},

            {name:'Beanie 1', price:120000, img:'images/beanie/beanie1.jpg'},
            {name:'Beanie 2', price:120000, img:'images/beanie/beanie2.jpg'}
        ];

        let html = `
        <h1>⚡ Band Hardcore XYZ ⚡</h1>
        <p>Merchandise resmi kami</p>
        <div class="merch-grid">
        `;

        products.forEach(p => {
            html += `
            <div class="merch-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>Rp${p.price.toLocaleString('id-ID')}</p>
                <button onclick="alert('${p.name} ditambahkan!')">Beli</button>
            </div>
            `;
        });

        html += `</div>`;
        content.innerHTML = html;
    }

    // ABOUT
    else if(page==='about'){
        content.className='about';
        content.innerHTML=`
        <h1>Tentang Band XYZ</h1>
        <p>Kami adalah band hardcore punk lokal. Terima kasih sudah mendukung musik underground!</p>`;
    }

    // PORTFOLIO
    else if(page==='portfolio'){
        content.className='portfolio';
        content.innerHTML=`
        <h1>Portfolio</h1>
        <div class="card"><h3>Album 1</h3></div>
        <div class="card"><h3>Album 2</h3></div>
        <div class="card"><h3>Live Show</h3></div>`;
    }

    // CONTACT (EMAIL FORM)
    else if(page==='contact'){
        content.className='contact';
        content.innerHTML=`
        <h1>Kontak</h1>

        <form id="contactForm" action="https://formspree.io/f/mreojzrj" method="POST">
            <input type="hidden" name="_subject" value="Pesan dari Website Band XYZ">

            <input type="text" name="name" placeholder="Nama" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Pesan" rows="5" required></textarea>

            <button type="submit">Kirim</button>
        </form>
        `;

        document.getElementById('contactForm').addEventListener('submit', function(e){
            e.preventDefault();

            fetch(this.action,{
                method:'POST',
                body:new FormData(this),
                headers:{'Accept':'application/json'}
            }).then(()=>{
                alert('Pesan berhasil dikirim ke email!');
                this.reset();
            }).catch(()=>{
                alert('Gagal mengirim, coba lagi.');
            });
        });
    }
}

showPage('home');
</script>

</body>
</html>
